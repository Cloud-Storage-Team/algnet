type: fat-tree

presets:
  link:
    latency: 1000ns
    throughput: 10Gbps
    ingress_buffer_size: 4096KB
    egress_buffer_size: 4096KB
    metrics_filters:
      queue_sizes: false

packet-spraying:
  type: ecmp

switches:
  ports-count: 4
  core:
    ecn:
      min: 0.2
      max: 0.3
      probability: 1.0

  aggr:
    ecn:
      min: 0.2
      max: 0.3
      probability: 0.7
  
  edge:
    ecn:
      min: 0.2
      max: 0.3
      probability: 0.5

hosts:

links:
  core-aggr:
    preset-name: link
    throughput: 100Gbps
  aggr-edge:
    preset-name: link
  edge-host:
    preset-name: link