topology_config_path: "bus_topology.yml"

presets:
  connection:
    default:
      type: mplb-connection
      mplb:
        type: single-cc
        packet-size: 1500B
        cc:
          type: tahoe
        path-chooser:
          type: round-robin
          flows:
            flow:
              type: tcp

connections:
  connection-1->1:
    preset-name: default
    sender_id: sender1
    receiver_id: receiver1
  connection-1->2:
    preset-name: default
    sender_id: sender1
    receiver_id: receiver2
  connection-2->1:
    preset-name: default
    sender_id: sender2
    receiver_id: receiver1
  connection-2->2:
    preset-name: default
    sender_id: sender2
    receiver_id: receiver2

