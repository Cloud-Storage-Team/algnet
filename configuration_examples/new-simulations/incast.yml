topology_config_path: ../topology_examples/incast_topology.yml

presets:
  connection:
    default:
      type: mplb-connection
      mplb:
        type: single-cc
        packet-size: 1500B
        cc:
          type: tahoe
        path-chooser:
          type: round-robin
          flows:
            flow:
              type: tcp

connections:
  conn0:
    preset-name: default
    sender_id: sender0
    receiver_id: receiver0

  conn1:
    preset-name: default
    sender_id: sender1
    receiver_id: receiver0

  conn2:
    preset-name: default
    sender_id: sender2
    receiver_id: receiver0

  conn3:
    preset-name: default
    sender_id: sender3
    receiver_id: receiver0

  conn4:
    preset-name: default
    sender_id: sender4
    receiver_id: receiver0

scenario:
  - action: send_data
    id: send-1
    when: 0ns
    size: 1000000B
    connections: conn.*
    jitter: 1000ns
